name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated to v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.10' # Specify Python version

      - name: Install backend dependencies
        run: pip install -r event_booking_platform_backend/requirements.txt

      - name: Run Flake8
        run: |
          pip install flake8 # Ensure flake8 is installed
          flake8 event_booking_platform_backend/

      - name: Set up Node.js
        uses: actions/setup-node@v4 # Updated to v4
        with:
          node-version: '20' # Specify Node.js version

      - name: Install frontend dependencies
        run: cd event_booking_platform_frontend && npm install

      - name: Run ESLint
        run: cd event_booking_platform_frontend && npm run lint:ci # Use lint:ci for quieter output

  test-backend:
    name: Test Backend
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: pip install -r event_booking_platform_backend/requirements.txt

      - name: Create backend .env file
        run: |
          echo "DATABASE_URL=sqlite:///:memory:" > event_booking_platform_backend/.env
          echo "REDIS_URL=redis://localhost:6379/1" >> event_booking_platform_backend/.env
          echo "SECRET_KEY=testsecretkeyforci_backend" >> event_booking_platform_backend/.env
          echo "DEBUG=True" >> event_booking_platform_backend/.env
          # Dummy cache for tests to avoid Redis dependency in CI for unit tests
          echo "CACHES = {'default': {'BACKEND': 'django.core.cache.backends.dummy.DummyCache'}}" >> event_booking_platform_backend/.env

      - name: Run backend tests
        run: |
          cd event_booking_platform_backend
          pytest -W ignore::DeprecationWarning --cov=./ --cov-report=xml # Generate coverage report

  test-frontend:
    name: Test Frontend
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./event_booking_platform_frontend # Use working-directory for cleaner cd
        run: npm install

      - name: Create frontend .env file
        working-directory: ./event_booking_platform_frontend
        run: |
          echo "NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api/mock_ci" > .env.local
          # Add any other frontend env vars needed for tests/build

      - name: Run frontend tests
        working-directory: ./event_booking_platform_frontend
        # The --ci flag is common for Jest. --json and --outputFile are for report generation.
        # Add --passWithNoTests if Jest fails when no tests are found (might happen in early stages)
        run: npm test -- --ci --reporters=default --reporters=jest-junit --coverage --passWithNoTests
        # jest-junit can be added to devDependencies for JUnit XML report

  build-docker-images:
    name: Build Docker Images
    needs: [test-backend, test-frontend] # Runs if both test jobs succeed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # Updated to v3

      - name: Build backend Docker image
        run: |
          # Check if Dockerfile exists before building
          if [ -f event_booking_platform_backend/Dockerfile ]; then
            docker build -t backend-image:latest -f event_booking_platform_backend/Dockerfile event_booking_platform_backend/
          else
            echo "Backend Dockerfile not found, skipping build."
          fi

      - name: Build frontend Docker image
        run: |
          # Check if Dockerfile exists before building
          if [ -f event_booking_platform_frontend/Dockerfile ]; then
            docker build -t frontend-image:latest -f event_booking_platform_frontend/Dockerfile event_booking_platform_frontend/
          else
            echo "Frontend Dockerfile not found, skipping build."
          fi

      # No push step, as specified. Images are built but not pushed.
      # To list images (optional):
      # - name: List Docker images
      #   run: docker images

  e2e-tests:
    name: Run Frontend E2E Tests
    needs: [test-backend, test-frontend, build-docker-images] # Depends on tests and builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js # For any host-level npm/node scripts, if necessary.
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create backend .env file for E2E
        run: |
          echo "DATABASE_URL=sqlite:///:memory:" > event_booking_platform_backend/.env
          # For E2E, we might want a persistent DB or a test-specific setup if :memory: isn't shared correctly.
          # However, for most cases where E2E primarily tests frontend against mocked backend or a live but reset backend, this is fine.
          # If using docker-compose, ensure this .env is picked up by the backend service.
          # The backend Dockerfile or docker-compose.yml should handle copying this .env.
          # For now, we assume it's correctly placed to be used by the backend service in docker-compose.
          echo "REDIS_URL=redis://redis:6379/1" >> event_booking_platform_backend/.env # Use service name 'redis'
          echo "SECRET_KEY=testsecretkeyforci_e2e_backend" >> event_booking_platform_backend/.env
          echo "DEBUG=True" >> event_booking_platform_backend/.env
          echo "ALLOWED_HOSTS=*" >> event_booking_platform_backend/.env # Allow any host for CI
          echo "CACHES = {'default': {'BACKEND': 'django.core.cache.backends.dummy.DummyCache'}}" >> event_booking_platform_backend/.env


      - name: Create frontend .env.local file for E2E
        working-directory: ./event_booking_platform_frontend
        run: |
          echo "NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api" > .env.local
          # Ensure this is picked up by the frontend service in docker-compose.
          # The frontend Dockerfile or docker-compose.yml should handle this.

      - name: Ensure docker-compose.yml is configured correctly
        run: |
          # This is a placeholder for any checks or modifications needed for docker-compose.yml in CI
          # For example, ensuring ports are mapped to localhost if tests run from the host talking to containers.
          # Or ensuring service names are used if tests run within a container talking to another.
          # The current setup assumes NEXT_PUBLIC_API_BASE_URL points to localhost:8000,
          # so docker-compose must map backend's 8000 to host's 8000.
          if [ ! -f docker-compose.yml ]; then
            echo "docker-compose.yml not found!"
            exit 1
          fi
          # Example: Check if backend port 8000 is exposed to host 8000
          # This check is illustrative. Actual check might be more complex or unnecessary if config is known.
          # grep -q "8000:8000" docker-compose.yml || (echo "Backend port 8000 not mapped to host 8000 in docker-compose.yml" && exit 1)


      - name: Build and Run Docker Services in Background
        run: docker-compose up --build -d
        # --build is included to ensure images are fresh or rebuilt if necessary.
        # -d runs them in detached mode.

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for backend (http://localhost:8000/api/schema/swagger-ui/) to be ready..."
          timeout 120s bash -c 'until curl -s -f http://localhost:8000/api/schema/swagger-ui/ > /dev/null; do echo "Backend not up yet, sleeping for 5s..."; sleep 5; done'
          echo "Backend is up."

          echo "Waiting for frontend (http://localhost:3000) to be ready..."
          timeout 120s bash -c 'until curl -s -f http://localhost:3000 > /dev/null; do echo "Frontend not up yet, sleeping for 5s..."; sleep 5; done'
          echo "Frontend is up."

      # The npm install step here runs on the GitHub Actions runner, not in the container.
      # Cypress dependencies should be part of the frontend Docker image.
      # If `npm run cypress:run` is executed via `docker-compose exec`, that command runs *inside* the container.
      # So, this step might be for ensuring the host can run some Cypress-related commands if needed,
      # or it's a misunderstanding of where Cypress runs.
      # Assuming `cypress:run` in package.json inside the frontend container handles everything.
      # - name: Install frontend dependencies (for host, if needed for any reason)
      #   working-directory: ./event_booking_platform_frontend
      #   run: npm install

      - name: Run Cypress E2E tests
        # The -T flag is important for non-interactive environments like CI
        # This command executes `npm run cypress:run` INSIDE the 'frontend' service container
        run: docker-compose exec -T frontend npm run cypress:run

      - name: Stop Docker Services
        if: always() # Ensures services are stopped even if tests fail or are cancelled
        run: docker-compose down

      # Optional: Upload Cypress artifacts (screenshots/videos) on failure
      - name: Upload Cypress Artifacts
        if: failure()
        uses: actions/upload-artifact@v4 # Updated to v4
        with:
          name: cypress-artifacts
          path: |
            event_booking_platform_frontend/cypress/screenshots
            event_booking_platform_frontend/cypress/videos
