version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eventplatform_dev}
      POSTGRES_USER: ${POSTGRES_USER:-eventuser_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eventpass_dev}
    ports:
      - "5432:5432"
    healthcheck: # Added healthcheck for PostgreSQL
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eventuser_dev} -d ${POSTGRES_DB:-eventplatform_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cache:
    image: redis:7-alpine
    volumes:
      - redis_data:/data # Optional: for persistence if needed
    ports:
      - "6379:6379" # Optional: for direct access
    restart: unless-stopped

  backend:
    build:
      context: ./event_booking_platform_backend
      dockerfile: Dockerfile
    # Command is now in Dockerfile (CMD gunicorn...)
    volumes:
      - ./event_booking_platform_backend:/app # For development: mount local code
      # For production, you might remove this volume mount to use code built into the image
      # Or use it for specific config/media files if not using external storage.
      # - static_volume:/app/staticfiles # Example if not using Whitenoise or for Nginx serving
      - media_volume:/app/media # Persist user-uploaded media files
    ports:
      - "8000:8000"
    env_file:
      - ./event_booking_platform_backend/.env # Developer creates this from .env.example
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./event_booking_platform_frontend
      dockerfile: Dockerfile
    volumes:
      - ./event_booking_platform_frontend:/app # Mount local code
      - /app/node_modules # Named volume to persist node_modules separate from local
      - /app/.next       # Persist .next build cache if desired for faster rebuilds on restart
    ports:
      - "3000:3000"
    environment:
      # Ensures hot reloading works effectively with Docker volumes
      - WATCHPACK_POLLING=true
      # For Next.js to correctly identify the port in Docker
      - PORT=3000
    env_file:
      - ./event_booking_platform_frontend/.env.local # Developer creates this from .env.local.example
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  # static_volume: # If you choose to use a volume for static files served by Nginx
  media_volume: # For user-uploaded media files
