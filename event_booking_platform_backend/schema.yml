components:
  schemas:
    Booking:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        event:
          type: integer
          description: ID of the event to book. Required for creating a booking.
        event_details:
          allOf:
          - $ref: '#/components/schemas/NestedEvent'
          readOnly: true
          description: Read-only. Key details of the event being booked.
        user:
          type: integer
          readOnly: true
        user_details:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
          description: Read-only. Detailed information about the user who made the
            booking.
        number_of_tickets:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          description: Number of tickets to book for the event. Must be a positive
            integer.
        price_per_ticket_at_booking:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
          nullable: true
        total_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        booking_time:
          type: string
          format: date-time
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/BookingStatusEnum'
          description: |-
            Status of the booking. Choices: 'pending', 'confirmed', 'cancelled'. Defaults to 'pending'.

            * `confirmed` - Confirmed
            * `cancelled` - Cancelled
            * `pending` - Pending
            * `pending_payment` - Pending Payment
        payment_status:
          type: string
          readOnly: true
          description: Read-only. The status of the associated payment.
        payment_details:
          allOf:
          - $ref: '#/components/schemas/Payment'
          readOnly: true
          description: Read-only. Detailed information about the associated payment.
      required:
      - booking_time
      - event
      - event_details
      - id
      - payment_details
      - payment_status
      - price_per_ticket_at_booking
      - total_price
      - user
      - user_details
    BookingStatusEnum:
      enum:
      - confirmed
      - cancelled
      - pending
      - pending_payment
      type: string
      description: |-
        * `confirmed` - Confirmed
        * `cancelled` - Cancelled
        * `pending` - Pending
        * `pending_payment` - Pending Payment
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Name of the event category (e.g., 'Music', 'Sports'). Must
            be unique.
          maxLength: 100
        description:
          type: string
          nullable: true
          description: Optional. A brief description of the category.
      required:
      - id
      - name
    Event:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Name of the event.
          maxLength: 200
        description:
          type: string
          nullable: true
          description: Optional. Detailed description of the event.
        venue:
          type: integer
          description: ID of the venue where the event will take place. This is required.
        venue_name:
          type: string
          readOnly: true
          description: Name of the venue where the event is held (Read-only).
        organizer:
          type: integer
          description: ID of the user organizing the event. This is required.
        organizer_username:
          type: string
          readOnly: true
          description: Username of the user who organized the event (Read-only).
        categories:
          type: array
          items:
            type: string
          description: List of category names associated with the event. For writing,
            provide a list of existing category names (e.g., ["Music", "Conference"]).
        start_time:
          type: string
          format: date-time
          description: Event start date and time (YYYY-MM-DDTHH:MM:SS format).
        end_time:
          type: string
          format: date-time
          description: Event end date and time (YYYY-MM-DDTHH:MM:SS format). Must
            be after start_time.
        status:
          allOf:
          - $ref: '#/components/schemas/EventStatusEnum'
          description: |-
            Current status of the event. Choices: 'upcoming', 'ongoing', 'past', 'cancelled'. Defaults to 'upcoming'.

            * `upcoming` - Upcoming
            * `ongoing` - Ongoing
            * `past` - Past
            * `cancelled` - Cancelled
        ticket_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          description: Price per ticket for the event. Use '0.00' for free events.
            (e.g., '25.50').
        max_capacity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
          description: Maximum capacity for this event. If blank, venue capacity will
            be used. Cannot exceed venue capacity or be less than confirmed tickets.
        effective_capacity:
          type: integer
          readOnly: true
        confirmed_tickets_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - categories
      - confirmed_tickets_count
      - created_at
      - effective_capacity
      - end_time
      - id
      - name
      - organizer
      - organizer_username
      - start_time
      - updated_at
      - venue
      - venue_name
    EventStatusEnum:
      enum:
      - upcoming
      - ongoing
      - past
      - cancelled
      type: string
      description: |-
        * `upcoming` - Upcoming
        * `ongoing` - Ongoing
        * `past` - Past
        * `cancelled` - Cancelled
    Login:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
      required:
      - password
    NameEnum:
      enum:
      - ADMIN
      - EVENT_ORGANIZER
      - VENUE_MANAGER
      - CUSTOMER
      type: string
      description: |-
        * `ADMIN` - Admin
        * `EVENT_ORGANIZER` - Event Organizer
