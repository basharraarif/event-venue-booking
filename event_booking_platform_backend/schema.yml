  /api/venues/:
    get:
      operationId: venues_list
      description: "Retrieves a list of all available venues.\n\n        **Filtering\
        \ Options:**\n        - `name`: Filter by venue name (partial match, case-insensitive).\n\
        \        - `address`: Filter by venue address (partial match, case-insensitive).\n\
        \        - `min_capacity`: Filter by minimum guest capacity (e.g., `?min_capacity=100`).\n\
        \        - `max_capacity`: Filter by maximum guest capacity (e.g., `?max_capacity=500`).\n\
        \        - `has_parking`: Filter by availability of parking (boolean: `true`\
        \ or `false`).\n        - `has_public_transport`: Filter by availability of\
        \ public transport access (boolean: `true` or `false`).\n\n        **Search\
        \ Fields:** (Use the `search` query parameter)\n        - `name`: Search within\
        \ venue names.\n        - `address`: Search within venue addresses.\n    \
        \    - `amenities`: Search within venue amenities description (if amenities\
        \ is a text field).\n        "
      summary: List all venues
      parameters:
      - in: query
        name: address_contains
        schema:
          type: string
      - in: query
        name: amenities_name_in
        schema:
          type: string
