        name: id
        schema:
          type: integer
        description: A unique integer value identifying this event.
        required: true
      tags:
      - events-management
      security:
      - tokenAuth: []
      responses:
        '204':
          description: No response body
  /api/payments/create-payment-intent/:
    post:
      operationId: payments_create_payment_intent_create
      description: "Given a `booking_id`, this endpoint creates a new Stripe PaymentIntent\
        \ \n    or retrieves an existing one if the payment is still pending.\n  \
        \  It returns the `client_secret` needed by the frontend to confirm the payment\
        \ with Stripe.\n    "
      summary: Create or Retrieve Stripe Payment Intent
      tags:
      - payments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentIntentCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PaymentIntentCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PaymentIntentCreate'
        required: true
      security:
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntentResponse'
          description: ''
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntentResponse'
          description: ''
        '400':
          description: Bad Request - Invalid input, booking not payable, or already
            paid
        '401':
          description: Unauthorized - Authentication required
        '404':
          description: Not Found - Booking not found or permission denied
        '500':
          description: Internal Server Error - Stripe API error or other unexpected
            error
  /api/payments/stripe-webhook/:
    post:
      operationId: payments_stripe_webhook_create
      description: "Handles incoming webhook events from Stripe to update payment\
        \ statuses,\n        booking statuses, and send notifications.\n        This\
        \ endpoint should be configured in your Stripe dashboard.\n        It verifies\
        \ the Stripe signature for security.\n        Currently handles: `payment_intent.succeeded`,\
        \ `payment_intent.payment_failed`.\n        "
      summary: Stripe Webhook Handler
      tags:
      - payments
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: Webhook received and processed successfully (or acknowledged
            for unhandled events).
        '400':
          description: Bad Request - Invalid payload or signature.
        '500':
          description: Internal Server Error - Webhook secret not configured.
