      - in: query
        name: min_price_per_day
        schema:
          type: number
      - in: query
        name: min_price_per_hour
        schema:
          type: number
      - in: query
        name: owner
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - venues
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
