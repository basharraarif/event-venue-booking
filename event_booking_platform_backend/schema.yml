  /api/events-management/events/:
    get:
      operationId: events_management_events_list
      description: "Retrieves a list of all events.\n\n        **Filtering Options\
        \ (query parameters):**\n        - `name`: Filter by event name (partial match,\
        \ case-insensitive, e.g., `?name=Tech`).\n        - `venue`: Filter by venue\
        \ ID (e.g., `?venue=1`).\n        - `organizer`: Filter by organizer (user)\
        \ ID (e.g., `?organizer=2`).\n        - `status`: Filter by event status.\
        \ Choices: `upcoming`, `ongoing`, `past`, `cancelled` (e.g., `?status=upcoming`).\n\
        \        - `category_name`: Filter by the exact name of one category associated\
        \ with the event (e.g., `?category_name=Music`).\n        - `start_time_after`:\
        \ Filter for events starting on or after a given datetime (YYYY-MM-DD or YYYY-MM-DDTHH:MM:SS\
        \ format, e.g., `?start_time_after=2024-01-01`).\n        - `start_time_before`:\
        \ Filter for events starting on or before a given datetime (YYYY-MM-DD or\
        \ YYYY-MM-DDTHH:MM:SS format, e.g., `?start_time_before=2024-12-31`).\n  \
        \      "
      summary: List all events
      parameters:
      - in: query
        name: category_name
        schema:
          type: string
      - in: query
        name: name
        schema:
          type: string
      - in: query
        name: organizer
        schema:
          type: integer
      - in: query
        name: start_time_after
        schema:
          type: string
          format: date-time
      - in: query
        name: start_time_before
        schema:
          type: string
          format: date-time
      - in: query
        name: status
        schema:
          type: string
          enum:
          - cancelled
          - ongoing
          - past
          - upcoming
        description: |-
          * `upcoming` - Upcoming
          * `ongoing` - Ongoing
          * `past` - Past
          * `cancelled` - Cancelled
      - in: query
        name: venue
        schema:
          type: integer
      tags:
      - events-management
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
          description: ''
    post:
      operationId: events_management_events_create
      description: |-
        API endpoint for managing events.
        Provides CRUD operations and supports filtering.
        The `ticket_price` for the event is defined here.
      summary: Create a new event
      tags:
      - events-management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Event'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Event'
        required: true
      security:
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
          description: ''
