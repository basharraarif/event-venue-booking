      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyEmail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyEmail'
        required: true
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestAuthDetail'
          description: ''
  /api/auth/user/:
    get:
      operationId: auth_user_retrieve
      description: |-
        Reads and updates UserModel fields
        Accepts GET, PUT, PATCH methods.

        Default accepted fields: username, first_name, last_name
        Default display fields: pk, username, email, first_name, last_name
        Read-only fields: pk, email

        Returns UserModel fields.
      tags:
      - auth
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetails'
          description: ''
    put:
      operationId: auth_user_update
      description: |-
        Reads and updates UserModel fields
        Accepts GET, PUT, PATCH methods.

        Default accepted fields: username, first_name, last_name
        Default display fields: pk, username, email, first_name, last_name
        Read-only fields: pk, email

        Returns UserModel fields.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDetails'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserDetails'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserDetails'
        required: true
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetails'
          description: ''
    patch:
      operationId: auth_user_partial_update
      description: |-
        Reads and updates UserModel fields
        Accepts GET, PUT, PATCH methods.

        Default accepted fields: username, first_name, last_name
        Default display fields: pk, username, email, first_name, last_name
        Read-only fields: pk, email

        Returns UserModel fields.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserDetails'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserDetails'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserDetails'
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetails'
          description: ''
  /api/bookings/bookings/:
    get:
      operationId: bookings_bookings_list
      description: "Retrieves a list of bookings.\n        - Regular users will see\
        \ only their own bookings.\n        - Admin users will see all bookings.\n\
        \n        **Filtering Options (query parameters):**\n        - `event`: Filter\
        \ by event ID (e.g., `?event=1`).\n        - `user`: (Admins only) Filter\
        \ by user ID (e.g., `?user=2`).\n        - `status`: Filter by booking status.\
        \ Choices: `pending`, `confirmed`, `cancelled` (e.g., `?status=confirmed`).\n\
        \        "
      summary: List bookings
      parameters:
      - in: query
        name: event
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
          enum:
          - cancelled
          - confirmed
          - pending
          - pending_payment
        description: |-
          * `confirmed` - Confirmed
          * `cancelled` - Cancelled
          * `pending` - Pending
          * `pending_payment` - Pending Payment
      - in: query
        name: user
        schema:
          type: integer
      tags:
      - bookings
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
          description: ''
    post:
      operationId: bookings_bookings_create
      description: Creates a new booking for an event. The 'user' field is automatically
        set to the currently authenticated user. The 'total_price' is calculated based
        on the event's ticket price and number of tickets.
      summary: Create a new booking
      tags:
      - bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Booking'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Booking'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Booking'
        required: true
      security:
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
  /api/bookings/bookings/{id}/:
    get:
      operationId: bookings_bookings_retrieve
      description: Retrieves details of a specific booking. Regular users can only
        retrieve their own bookings. Admins can retrieve any booking.
      summary: Retrieve a booking
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this booking.
        required: true
      tags:
      - bookings
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
    put:
      operationId: bookings_bookings_update
      description: Updates all fields for an existing booking. Regular users can only
        update their own bookings. Admins can update any booking. Some fields like
        'event' might be restricted from update after creation depending on business
        logic (not enforced by default).
      summary: Update a booking (full)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this booking.
        required: true
      tags:
      - bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Booking'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Booking'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Booking'
        required: true
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
    patch:
      operationId: bookings_bookings_partial_update
      description: Partially updates an existing booking. Only the fields provided
        in the request will be updated. Regular users can only update their own bookings.
        Admins can update any booking.
      summary: Partially update a booking
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this booking.
        required: true
      tags:
      - bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedBooking'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedBooking'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedBooking'
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
    delete:
      operationId: bookings_bookings_destroy
      description: Deletes an existing booking. Regular users can only delete their
        own bookings (potentially restricted by status, e.g., cannot delete 'confirmed'
        bookings - not enforced by default). Admins can delete any booking.
      summary: Delete a booking
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this booking.
        required: true
      tags:
      - bookings
      security:
      - tokenAuth: []
      responses:
        '204':
          description: No response body
  /api/bookings/bookings/{id}/cancel_booking/:
    post:
      operationId: bookings_bookings_cancel_booking_create
      description: Cancels a booking. Permissions are handled by get_permissions.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this booking.
        required: true
      tags:
      - bookings
      requestBody:
        content:
          application/json:
            schema:
