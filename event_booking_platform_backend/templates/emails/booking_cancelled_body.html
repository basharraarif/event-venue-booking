<!DOCTYPE html>
<html>
<head>
    <title>Booking Cancelled</title>
</head>
<body>
    <p>Dear {{ user_name }},</p>
    <p>Your booking for the event "<strong>{{ event_name }}</strong>" (Booking ID: {{ booking_id }}) has been cancelled.</p>
    <p>If this was unintentional, please contact us or try booking again.</p>
    <p>Booking Details:</p>
    <ul>
        <li>Event: {{ event_name }}</li>
        <li>Number of Tickets: {{ num_tickets }}</li>
    </ul>
    <p>Thank you.</p>
</body>
</html>
